name: Daily Football Report

on:
  schedule:
    # 20:59 UTC تعادل 23:59 (11:59 مساءً) بتوقيت مكة المكرمة
    - cron: '59 20 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests pandas openpyxl
      - name: Run script
        run: python Test2.py  # تم تغيير اسم الملف هنا
